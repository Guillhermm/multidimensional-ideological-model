<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Multidimensional Ideological Model</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <h2>4D Ideological Atlas</h2>

    <div class="control">
      <label>Time: <span id="yearLabel"></span></label>
      <input type="range" id="timeSlider" />
    </div>

    <div class="control">
      <label>X (economics)</label>
      <input type="range" id="xSlider" min="-1" max="1" step="0.01" value="0">
    </div>

    <div class="control">
      <label>Y (authority)</label>
      <input type="range" id="ySlider" min="-1" max="1" step="0.01" value="0">
    </div>

    <div class="control">
      <label>Z (cultural/national)</label>
      <input type="range" id="zSlider" min="-1" max="1" step="0.01" value="0">
    </div>

    <div class="control">
      <label>Historical Gravitacional Force</label>
      <input type="range" id="gravitySlider" min="0" max="2" step="0.01" value="0.4">
    </div>

    <div class="control buttons">
      <button id="autoPlay">▶ Auto</button>
      <button id="exportPNG">📸 Export PNG</button>
    </div>

    <div class="info">
      Year: <span class="year"></span><br>
      Radicality: <span class="radicality"></span><br>
      Nearest to: <span class="nearest"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
