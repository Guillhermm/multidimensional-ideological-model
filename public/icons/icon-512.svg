<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f0f1a"/>
  <defs>
    <!--
      Same conic gradient simulation scaled up.
      Sphere radius = 210px, center = (256, 256)

      Wedge endpoints (radius 210, measured clockwise from 12 o'clock):
        0°  → (256, 46)
        72° → (256+210×0.9511, 256−210×0.309) = (455.7, 191.1)
       144° → (256+210×0.5878, 256+210×0.809) = (379.4, 425.9)
       216° → (256−210×0.5878, 256+210×0.809) = (132.6, 425.9)
       288° → (256−210×0.9511, 256−210×0.309) = (56.3, 191.1)
       360° → (256, 46)
    -->
    <filter id="blur" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="sph">
      <circle cx="256" cy="256" r="216"/>
    </clipPath>
  </defs>

  <!-- Conic gradient sphere -->
  <g clip-path="url(#sph)" opacity="0.85">
    <g filter="url(#blur)">
      <!-- Red 0°→72° -->
      <path d="M256 256 L256 46 A210 210 0 0 1 455.7 191.1 Z" fill="#ef4444"/>
      <!-- Orange 72°→144° -->
      <path d="M256 256 L455.7 191.1 A210 210 0 0 1 379.4 425.9 Z" fill="#f97316"/>
      <!-- Green 144°→216° -->
      <path d="M256 256 L379.4 425.9 A210 210 0 0 1 132.6 425.9 Z" fill="#22c55e"/>
      <!-- Blue 216°→288° -->
      <path d="M256 256 L132.6 425.9 A210 210 0 0 1 56.3 191.1 Z" fill="#3b82f6"/>
      <!-- Indigo 288°→360° -->
      <path d="M256 256 L56.3 191.1 A210 210 0 0 1 256 46 Z" fill="#818cf8"/>
    </g>
  </g>

  <!-- Inner overlay: radius = 210 × (42/48) = 183.75 ≈ 184px -->
  <circle cx="256" cy="256" r="184" fill="#070710" fill-opacity="0.3" stroke="white" stroke-opacity="0.15" stroke-width="3"/>

  <!-- X axis -->
  <line x1="46" y1="256" x2="466" y2="256" stroke="#ef4444" stroke-opacity="0.6" stroke-width="3"/>
  <!-- Y axis -->
  <line x1="256" y1="46" x2="256" y2="466" stroke="#22c55e" stroke-opacity="0.6" stroke-width="3"/>
</svg>
