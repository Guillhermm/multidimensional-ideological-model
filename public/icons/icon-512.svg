<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0f0f1a"/>
  <defs>
    <radialGradient id="sg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#3b82f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.85"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="256" cy="256" r="182"/>
    </clipPath>
  </defs>
  <!-- Sphere -->
  <circle cx="256" cy="256" r="182" fill="url(#sg)"/>
  <!-- Subtle inner highlight -->
  <circle cx="208" cy="202" r="60" fill="rgba(255,255,255,0.07)" clip-path="url(#c)"/>
  <!-- Sphere border -->
  <circle cx="256" cy="256" r="182" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>
  <!-- X axis (red) -->
  <line x1="74" y1="256" x2="438" y2="256" stroke="#ef4444" stroke-width="5" opacity="0.65"/>
  <!-- Y axis (green) -->
  <line x1="256" y1="74" x2="256" y2="438" stroke="#22c55e" stroke-width="5" opacity="0.65"/>
  <!-- Z axis hint (diagonal, blue) -->
  <line x1="128" y1="384" x2="384" y2="128" stroke="#3b82f6" stroke-width="3.5" opacity="0.4"/>
</svg>
