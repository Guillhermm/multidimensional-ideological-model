<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0f0f1a"/>
  <defs>
    <radialGradient id="sg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#3b82f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.85"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="96" cy="96" r="68"/>
    </clipPath>
  </defs>
  <!-- Sphere -->
  <circle cx="96" cy="96" r="68" fill="url(#sg)"/>
  <!-- Subtle inner highlight -->
  <circle cx="78" cy="76" r="22" fill="rgba(255,255,255,0.07)" clip-path="url(#c)"/>
  <!-- Sphere border -->
  <circle cx="96" cy="96" r="68" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>
  <!-- X axis (red) -->
  <line x1="28" y1="96" x2="164" y2="96" stroke="#ef4444" stroke-width="2.5" opacity="0.65"/>
  <!-- Y axis (green) -->
  <line x1="96" y1="28" x2="96" y2="164" stroke="#22c55e" stroke-width="2.5" opacity="0.65"/>
  <!-- Z axis hint (diagonal, blue) -->
  <line x1="48" y1="144" x2="144" y2="48" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
</svg>
